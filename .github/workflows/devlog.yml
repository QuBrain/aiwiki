name: Devlog

on:
  push:
    branches: [main, master]

jobs:
  update-devlog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Update devlog
        run: uv run python .github/scripts/update_devlog.py
